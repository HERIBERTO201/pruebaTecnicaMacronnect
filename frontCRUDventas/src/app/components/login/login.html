<div class="login-container">

  <h2>Login</h2>

  <input
    type="text"
    placeholder="Usuario"
    [(ngModel)]="usuario"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">Entrar</button>

  <p class="error" *ngIf="error">
    {{ error }}
  </p>

</div>
